name: Continuous Deployment - Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18.x"

      - name: Install dependencies and Build
        run: |
          npm install
          # Force build-time API URL (Vite reads VITE_* variables from env at build)
          VITE_API_URL="http://${{ secrets.SERVER_IP }}:3000/api" npm run build
        working-directory: ./client

      - name: Deploy to VPS via SCP
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 56420
          source: "client/dist/*"
          target: "/var/www/html/"
          strip_components: 2

